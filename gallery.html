<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Archive | S.R Mukhesh Kumar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #050b1a; --accent-color: #25bafa; --text-main: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        header { text-align: center; padding: 4rem 0; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .gallery-item { background: rgba(255,255,255,0.05); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .gallery-item img { width: 100%; height: 250px; object-fit: cover; display: block; }
        .info { padding: 1rem; text-align: center; }
        .back-btn { position: fixed; top: 20px; left: 20px; color: #fff; text-decoration: none; background: #25bafa; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; z-index: 100; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>
    <div class="container">
        <header><h1>3D Render Archive</h1></header>
        <div class="gallery-grid" id="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        // This loop automatically builds 25 boxes
        for (let i = 1; i <= 25; i++) {
            grid.innerHTML += `
                <div class="gallery-item">
                    <img src="${i}.png" onerror="this.src='${i}.jpg'" alt="Render">
                    <div class="info"><h3>Project ${i}</h3></div>
                </div>`;
        }
    </script>
</body>
</html>
